name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test
        env:
          DATABASE_URL: "file:./test.db"
          AUTH_SECRET: "test-secret"

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./test.db"
          AUTH_SECRET: "test-secret"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
